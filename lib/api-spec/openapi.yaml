openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Finance Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction management
  - name: categories
    description: Category management
  - name: ai
    description: AI-powered finance queries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: Get all transactions
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: integer
            description: Month number (1-12)
        - name: year
          in: query
          required: false
          schema:
            type: integer
            description: Year (e.g. 2025)
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [income, expense]
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /summary:
    get:
      operationId: getSummary
      tags: [transactions]
      summary: Get financial summary
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSummary"

  /stats/categories:
    get:
      operationId: getCategoryStats
      tags: [transactions]
      summary: Get spending by category
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Category statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

  /stats/monthly:
    get:
      operationId: getMonthlyStats
      tags: [transactions]
      summary: Get monthly income vs expense trend
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Monthly statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyStat"

  /ai/query:
    post:
      operationId: aiFinanceQuery
      tags: [ai]
      summary: Ask a natural language finance question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiQueryBody"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiQueryResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        description:
          type: string
        category:
          type: string
          enum:
            - Food
            - Shopping
            - Transportation
            - Housing
            - Healthcare
            - Entertainment
            - Travel
            - Salary
            - Freelance
            - Investment
            - Other
        note:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - amount
        - description
        - category
        - date
        - createdAt

    CreateTransactionBody:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          minimum: 0.01
        description:
          type: string
          minLength: 1
        category:
          type: string
          enum:
            - Food
            - Shopping
            - Transportation
            - Housing
            - Healthcare
            - Entertainment
            - Travel
            - Salary
            - Freelance
            - Investment
            - Other
        note:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
      required:
        - type
        - amount
        - description
        - category
        - date

    FinancialSummary:
      type: object
      properties:
        balance:
          type: number
        totalIncome:
          type: number
        totalExpenses:
          type: number
        month:
          type: integer
        year:
          type: integer
      required:
        - balance
        - totalIncome
        - totalExpenses
        - month
        - year

    CategoryStat:
      type: object
      properties:
        category:
          type: string
        total:
          type: number
        count:
          type: integer
        percentage:
          type: number
      required:
        - category
        - total
        - count
        - percentage

    MonthlyStat:
      type: object
      properties:
        month:
          type: integer
        year:
          type: integer
        income:
          type: number
        expenses:
          type: number
        label:
          type: string
      required:
        - month
        - year
        - income
        - expenses
        - label

    AiQueryBody:
      type: object
      properties:
        question:
          type: string
          minLength: 1
      required:
        - question

    AiQueryResponse:
      type: object
      properties:
        answer:
          type: string
        data:
          type: object
          nullable: true
          additionalProperties: true
      required:
        - answer
