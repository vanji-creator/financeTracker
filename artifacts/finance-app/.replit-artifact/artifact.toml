kind = "mobile"
previewPath = "/"
title = "Finance Tracker"
version = "1.0.0"
id = "artifacts/finance-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19539

[services.development]
run = "pnpm --filter @workspace/finance-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finance-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/finance-app", "run", "serve" ]

[services.env]
PORT = "19539"
BASE_PATH = "/"
